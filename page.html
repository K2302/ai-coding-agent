<script type="text/javascript">
    $(function () {
        //统计
        setTimeout(
            function () {
                $.ajax({
                    type: 'post',
                    url: '/API/Book.ashx?op=addviewrecord',
                    data: { bookid: 769572, articleid: 9660323 },
                    dataType: 'json',
                    cache: false,
                    global: false,
                    success: function (json) {
                        if (json.status == 200) {
                            $.ajax({
                                type: 'post',
                                url: '/ajax/ashx/Counter.ashx',
                                data: { id: 9660323 },
                                dataType: 'text',
                                cache: false,
                                global: false,
                                success: function (info) {
                                    HandleTicketBouns(info);
                                },
                                error: function (result, status) {
                                }
                            })
                        }
                    },
                    error: function (result, status) {
                    }
                });
            }, 3000);
        var tMutext = true;
        function HandleTicketBouns(info) {
            
            if (info != "0") {
                $("#TicketBouns").show();
                $("#TicketBouns li").eq(2).click(function(){
                    $("#TicketBouns").hide();
                });

                var infos = info.split('|');

                $(".tck_yp").click(function () {
                    if (tMutext) {
                        tMutext = false;
                        $("#TicketBouns").hide();
                        $.ajax({
                            type: 'post',
                            url: '/ajax/ashx/GetTicketBouns.ashx',
                            data: { ts: infos[1], key: infos[2] },
                            dataType: 'text',
                            cache: false,
                            global: false,
                            success: function (info) {
                                if (info == "1")
                                    ShowMessage("恭喜您成功获得一张月票!");
                                else if (info == "2")
                                    ShowMessage("很遗憾,您未在2分钟内领取月票,本次月票领取机会已过期.");
                                else if (info == "3")
                                    ShowMessage("参数校验出错.");
                                else if (info == "4")
                                    ShowMessage("只有登录用户可以获取月票.");
                                else ShowMessage("发生了未知的错误.");
                                tMutext = true;
                            },
                            error: function (result, status) {
                                ShowMessage("网络通信过程出现异常.");
                                tMutext = true;
                            }
                        });
                    }
                });
            }
        }
        $("#orderSingle").click(function () {
            var autoOrder = 0;
            if($("#autoOrder").attr("checked"))
                autoOrder = 1;
            consume.orderChapter(9660323,autoOrder, function(){location.href=location.href;}, function(msg){ShowMessage(msg)});
        })
        $("#orderAll").click(function () {
            var autoOrder = 0;
            if($("#autoOrder").attr("checked"))
                autoOrder = 1;
            consume.orderAllChapter(769572,autoOrder, function(){location.href=location.href;}, function(msg){ShowMessage(msg)});
        });
        $("#LinkPay").click(function(){
            location.href = "/pay/";
        });
        $('#Loading').ajaxStart(function () {
            ImageLoading("loaderImage");//图片loading效果
            $(this).show();
        }).ajaxStop(function () {
            //CloseMessage();
            ImageLoadingStop();
            $(this).hide();
        });

        if(browser.versions.weixin){
            $("#weixinTips").show();
        }
    });
    function ShowMessage(msginfo) {
        $("#Tips span").html(msginfo);
        $("#Tips").fadeIn();
        setTimeout(CloseMessage, 2000);
    }
    function CloseMessage() {
        $("#Tips").fadeOut();
    }
    $("body").contextmenu(function(){
        return false;
    });
    $("body").on("selectstart",function(){
        return false;
    });
    $("body").on("copy",function(){

    });
    $("body").on("cut",function(){
        return false;
    });
</script>
